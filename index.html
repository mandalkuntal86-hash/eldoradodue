<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
input,textarea,select{font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:#2563eb!important;background:#fff!important;outline:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.tb:hover{background:rgba(255,255,255,0.12)!important}
.ab:hover{opacity:.76}
.rc:hover{box-shadow:0 4px 15px rgba(37,99,235,0.10)!important;transform:translateY(-1px)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(10,18,40,0.76);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.modal-box{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:94vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.32);animation:fadeIn 0.18s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:15px 22px 12px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:1}
.modal-body{padding:18px 22px 22px}
.field-wrap{margin-bottom:12px}
.field-label{display:block;font-size:10px;font-weight:700;color:#374151;margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em}
.inp{width:100%;padding:9px 11px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;color:#0f172a;background:#f8fafc;font-family:inherit}
.tag{border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;display:inline-block}
.stat-card{background:#fff;border-radius:12px;padding:15px 17px;box-shadow:0 2px 9px rgba(0,0,0,0.06);flex:1;min-width:130px}
.stat-card-row{display:flex;justify-content:space-between;align-items:flex-start}
.stat-label{font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.stat-value{font-size:20px;font-weight:800;color:#0f172a;font-family:'Playfair Display',serif}
.stat-sub{font-size:10px;color:#94a3b8;margin-top:2px}
.stat-icon{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-primary{padding:11px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%}
.btn-cancel{padding:11px 14px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
button:disabled{opacity:.6;cursor:not-allowed!important}
#toast{position:fixed;top:68px;right:14px;z-index:500;border-radius:9px;padding:9px 14px;font-size:12px;font-weight:600;box-shadow:0 8px 22px rgba(0,0,0,0.12);max-width:280px;display:none;animation:fadeIn .2s ease}
</style>

<body>

<div id="app"></div>
<div id="toast"></div>

<script>
const STORAGE_KEY = 'due_master_v2';

// ── PASTE YOUR FIREBASE DATABASE URL HERE ─────────────────────────────────────
// After connecting Firebase on any device, copy the Database URL from
// Backup tab and paste it below. Then re-upload to GitHub.
// Every device will then auto-connect without any manual steps.
// Example: 'https://your-project-default-rtdb.firebaseio.com'
const HARDCODED_DB_URL = 'https://duemaster-bf3b5-default-rtdb.firebaseio.com';

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  tab: 'Dashboard',
  customers: [],
  search: '',
  filter: 'all',
  editId: null,
  collectCust: null,
  remDateCust: null,
  sendRemCust: null,
  confirmDel: null,
  showClearConfirm: false,
  clearPhase: 1,
  clearInput: '',
  restorePreview: null,
  bulkImport: { stage: 'upload', preview: null, mapping: {}, result: null, drag: false },
  restoreDrag: false,
  fbConnected: false,
  syncStatus: { msg: '', color: '' },
  showFbSetup: false,
  fbForm: { apiKey:'', authDomain:'', databaseURL:'', projectId:'' },
  form: { name:'', phone:'', email:'', refNo:'', amount:'', dueDate:'', reminderDate:'', reminderNote:'', notes:'' }
};

// ── PERSIST ──────────────────────────────────────────────────────────────────
// ── FIREBASE ──────────────────────────────────────────────────────────────────
let fbApp = null, fbDb = null, fbRef = null, fbListener = null;
let fbIgnoreNext = false;
let fbClearing = false;

// Config stored in localStorage on each device
function getFbConfig() {
  try { return JSON.parse(localStorage.getItem('dm_fb_config')||'null'); } catch{ return null; }
}
function saveFbConfig(cfg) {
  try { localStorage.setItem('dm_fb_config', JSON.stringify(cfg)); } catch{}
}
function clearFbConfig() {
  try { localStorage.removeItem('dm_fb_config'); } catch{}
}

// ── BOOTSTRAP: fetch config from Firebase using only databaseURL ──────────────
// Any device that knows the databaseURL can auto-connect
// We store the full config at a fixed path in the database
const BOOTSTRAP_KEY = 'dm_bootstrap_config';

function bootstrapConnect(databaseURL) {
  // Use fetch to read config from Firebase REST API — no SDK needed yet
  const url = databaseURL.replace(/\/$/, '') + '/' + BOOTSTRAP_KEY + '.json';
  updateSyncStatus('🔄 Connecting…', '#f59e0b');
  fetch(url)
    .then(r => r.json())
    .then(cfg => {
      if (cfg && cfg.apiKey) {
        saveFbConfig(cfg);
        waitForSDK(cfg, 10);
      } else {
        updateSyncStatus('❌ Config not found', '#ef4444');
        render();
      }
    })
    .catch(() => {
      updateSyncStatus('❌ Cannot reach Firebase', '#ef4444');
      render();
    });
}

function waitForSDK(cfg, attempts) {
  if (typeof firebase !== 'undefined' && firebase.initializeApp) {
    initFirebase(cfg);
  } else if (attempts > 0) {
    setTimeout(() => waitForSDK(cfg, attempts - 1), 300);
  } else {
    updateSyncStatus('❌ Firebase SDK failed to load', '#ef4444');
    render();
  }
}

function initFirebase(cfg) {
  try {
    if (fbApp) { try { fbApp.delete(); } catch{} }
    fbApp = firebase.initializeApp(cfg, 'duemaster_' + Date.now());
    fbDb  = fbApp.database();
    // Save config into Firebase so other devices can fetch it
    fbDb.ref(BOOTSTRAP_KEY).set(cfg).catch(()=>{});
    fbRef = fbDb.ref('duemaster_data');
    if (fbListener) fbRef.off('value', fbListener);
    startListener();
    state.fbConnected = true;
    saveFbConfig(cfg);
    // Save databaseURL separately for easy sharing
    try { localStorage.setItem('dm_db_url', cfg.databaseURL); } catch{}
    render();
    return true;
  } catch(e) {
    console.error('Firebase init error:', e);
    state.fbConnected = false;
    updateSyncStatus('❌ Connection failed', '#ef4444');
    return false;
  }
}

function startListener() {
  if (!fbRef || !fbDb) return;

  // Listen for CLEAR signal — any device that clears will broadcast to all others
  fbDb.ref('duemaster_cleared').on('value', snap => {
    if (!snap.val()) return; // null = signal removed, ignore
    if (fbClearing) return;  // we triggered this clear ourselves, ignore
    // Another device cleared — clear this device too
    state.customers = [];
    try { localStorage.removeItem(STORAGE_KEY); } catch{}
    render();
    updateSyncStatus('🗑️ Cleared by another device', '#f59e0b');
  });

  // Listen for data changes
  fbListener = fbRef.on('value', snap => {
    if (fbIgnoreNext) { fbIgnoreNext = false; return; }
    if (fbClearing) return;
    const raw = snap.val();
    if (raw === null || raw === undefined) {
      updateSyncStatus('✅ Synced', '#16a34a');
      return;
    }
    let data = Array.isArray(raw) ? raw.filter(Boolean) : Object.values(raw).filter(Boolean);
    if (data.length > 0) {
      state.customers = data;
      saveLocal();
      render();
      updateSyncStatus('✅ Synced', '#16a34a');
    }
  }, err => {
    updateSyncStatus('❌ Sync error — check Firebase rules', '#ef4444');
  });
}

function pushToFirebase() {
  if (!fbRef) return;
  fbIgnoreNext = true;
  const dataToStore = state.customers.length > 0 ? state.customers : null;
  fbRef.set(dataToStore)
    .then(() => updateSyncStatus('✅ Synced', '#16a34a'))
    .catch(e => { fbIgnoreNext = false; updateSyncStatus('❌ Sync failed', '#ef4444'); });
}

function disconnectFirebase() {
  if (fbDb) { try { fbDb.ref('duemaster_cleared').off(); } catch{} }
  if (fbRef && fbListener) { fbRef.off('value', fbListener); fbListener = null; }
  if (fbApp) { try { fbApp.delete(); } catch{} fbApp=null; fbDb=null; fbRef=null; }
  state.fbConnected = false;
  clearFbConfig();
  try { localStorage.removeItem('dm_db_url'); } catch{}
  updateSyncStatus('', '');
}

function updateSyncStatus(msg, color) {
  state.syncStatus = { msg, color };
  const el = document.getElementById('syncBadge');
  if (el && msg) { el.textContent = msg; el.style.background = color; el.style.display='inline-block'; }
  else if (el) { el.style.display='none'; }
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.customers)); } catch(e) {}
}
function saveData() {
  saveLocal();
  if (fbRef) pushToFirebase();
}

function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) state.customers = JSON.parse(d);
  } catch(e) {}

  // Priority 1: Full config already saved on this device (connected before)
  const cfg = getFbConfig();
  if (cfg && cfg.apiKey) {
    state.syncStatus = { msg: '🔄 Connecting…', color: '#f59e0b' };
    waitForSDK(cfg, 10);
    return;
  }

  // Priority 2: Database URL saved on this device
  const savedUrl = localStorage.getItem('dm_db_url');
  if (savedUrl) {
    bootstrapConnect(savedUrl);
    return;
  }

  // Priority 3: Hardcoded URL in the file — works for ALL devices automatically
  if (HARDCODED_DB_URL && HARDCODED_DB_URL.trim() !== '') {
    bootstrapConnect(HARDCODED_DB_URL.trim());
    return;
  }
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fc(n) { return '₹' + Number(n||0).toLocaleString('en-IN'); }
function fd(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function daysFrom(dateStr) {
  if(!dateStr) return null;
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.floor((todayDate()-d)/86400000);
}
function statusInfo(days) {
  if(days===null) return {label:'—',bg:'#f8fafc',badge:'#94a3b8'};
  if(days<0)  return {label:'Upcoming',bg:'#dcfce7',badge:'#16a34a'};
  if(days===0) return {label:'Due Today',bg:'#fef3c7',badge:'#d97706'};
  if(days<=7)  return {label:days+'d Overdue',bg:'#fff7ed',badge:'#ea580c'};
  if(days<=30) return {label:days+'d Overdue',bg:'#fee2e2',badge:'#dc2626'};
  return {label:days+'d Overdue',bg:'#fecaca',badge:'#991b1b'};
}
function reminderStatus(dateStr) {
  if(!dateStr) return null;
  const days = daysFrom(dateStr);
  if(days<0)  return {label:'In '+Math.abs(days)+'d',color:'#16a34a',bg:'#dcfce7'};
  if(days===0) return {label:'Remind Today!',color:'#d97706',bg:'#fef3c7'};
  return {label:days+'d ago',color:'#dc2626',bg:'#fee2e2'};
}
function collectBalance(c) {
  const collected = (c.collections||[]).reduce((s,x)=>s+x.amount,0);
  return {collected, balance: c.amount - collected};
}
function parseExcelDate(val) {
  if(!val) return '';
  if(typeof val==='number') return new Date((val-25569)*86400000).toISOString().split('T')[0];
  const s = String(val).trim();
  const mm = s.match(/^(\d{1,2})[-\s]([A-Za-z]{3})[-\s](\d{4})$/);
  if(mm){const mo={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};const m=mo[mm[2].toLowerCase()];if(m!==undefined)return new Date(+mm[3],m,+mm[1]).toISOString().split('T')[0];}
  const dm = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(dm) return new Date(+dm[3],+dm[2]-1,+dm[1]).toISOString().split('T')[0];
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const nd = new Date(s); if(!isNaN(nd)) return nd.toISOString().split('T')[0];
  return '';
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type==='error'?'#fef2f2':type==='info'?'#eff6ff':'#f0fdf4';
  el.style.border = '1px solid '+(type==='error'?'#fca5a5':type==='info'?'#93c5fd':'#86efac');
  el.style.color = type==='error'?'#991b1b':type==='info'?'#1d4ed8':'#166534';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display='none'; }, 3000);
}

// ── COMPUTED ─────────────────────────────────────────────────────────────────
function computed() {
  const unpaid = state.customers.filter(c=>!c.paid);
  const overdue = unpaid.filter(c=>daysFrom(c.dueDate)>0);
  const dueToday = unpaid.filter(c=>daysFrom(c.dueDate)===0);
  const upcoming = unpaid.filter(c=>daysFrom(c.dueDate)<0);
  const totalPending = unpaid.reduce((s,c)=>s+collectBalance(c).balance,0);
  const totalCollected = state.customers.reduce((s,c)=>(c.collections||[]).reduce((a,x)=>a+x.amount,0)+s,0);
  const remindersToday = state.customers.filter(c=>!c.paid&&c.reminderDate&&daysFrom(c.reminderDate)>=0);
  const q = state.search.toLowerCase();
  const filtered = state.customers.filter(c=>{
    const match = c.name.toLowerCase().includes(q)||(c.refNo||'').toLowerCase().includes(q)||(c.phone||'').includes(q);
    if(!match) return false;
    if(state.filter==='paid') return c.paid;
    if(state.filter==='unpaid') return !c.paid;
    if(state.filter==='overdue') return !c.paid&&daysFrom(c.dueDate)>0;
    if(state.filter==='today') return !c.paid&&daysFrom(c.dueDate)===0;
    if(state.filter==='upcoming') return !c.paid&&daysFrom(c.dueDate)<0;
    if(state.filter==='remind') return !c.paid&&c.reminderDate&&daysFrom(c.reminderDate)>=0;
    return true;
  }).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const collectionReport = [...state.customers].filter(c=>(c.collections||[]).length>0)
    .sort((a,b)=>new Date(b.collections.at(-1).at)-new Date(a.collections.at(-1).at));
  return {unpaid,overdue,dueToday,upcoming,totalPending,totalCollected,remindersToday,filtered,collectionReport};
}

const IC = {

function setTab(t) { state.tab=t; if(t!=='Add Due'){state.editId=null;resetForm();} render(); }
function resetForm() { state.form={name:'',phone:'',email:'',refNo:'',amount:'',dueDate:'',reminderDate:'',reminderNote:'',notes:''}; }

function handleSubmit() {
  const f = state.form;
  if(!f.name.trim()||!f.amount||!f.dueDate){ showToast('Fill Name, Amount, Due Date','error'); return; }
  if(state.editId) {
    state.customers = state.customers.map(c=>c.id===state.editId?{...c,...f,amount:parseFloat(f.amount)}:c);
    showToast('✅ Record updated!');
    state.editId=null;
  } else {
    state.customers.push({id:genId(),...f,amount:parseFloat(f.amount),paid:false,collections:[],reminders:[],createdAt:new Date().toISOString()});
    showToast('✅ Record added!');
  }
  resetForm(); saveData(); state.tab='Customers'; render();
}

function handleEdit(c) {
  state.editId=c.id;
  state.form={name:c.name,phone:c.phone||'',email:c.email||'',refNo:c.refNo||'',amount:c.amount,dueDate:c.dueDate,reminderDate:c.reminderDate||'',reminderNote:c.reminderNote||'',notes:c.notes||''};
  state.tab='Add Due'; render();
}

function handleDelete(id) {
  state.customers=state.customers.filter(c=>c.id!==id);
  state.confirmDel=null; saveData(); showToast('Record deleted','info'); render();
}

function handleCollection(custId, entry) {
  state.customers=state.customers.map(c=>{
    if(c.id!==custId) return c;
    const newCols=[...(c.collections||[]),entry];
    const {balance}=collectBalance({...c,collections:newCols});
    return {...c,collections:newCols,paid:balance<=0};
  });
  state.collectCust=null; saveData(); showToast('💰 Collection recorded!'); render();
}

function handleReminderDate(custId, date, note) {
  state.customers=state.customers.map(c=>c.id===custId?{...c,reminderDate:date,reminderNote:note}:c);
  state.remDateCust=null; saveData(); showToast('📅 Reminder set!'); render();
}

function handleSendReminder(custId, channel) {
  state.customers=state.customers.map(c=>{
    if(c.id!==custId) return c;
    return {...c,reminders:[...(c.reminders||[]),{id:genId(),channel,at:new Date().toISOString()}]};
  });
  state.sendRemCust=null; saveData(); render();
}

function handleBulkImport(records) {
  state.customers=[...state.customers,...records];
  saveData(); showToast(`✅ Imported ${records.length} records!`); render();
}

function handleMonthExport(monthKey) {
  if(!monthKey){showToast('No month selected','info');return;}
  const rows=[];
  state.customers.forEach(c=>{
    (c.collections||[]).forEach(x=>{
      if(!x.date) return;
      const d = new Date(x.date);
      const key = d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
      if(key!==monthKey) return;
      rows.push({'Customer Name':c.name,'Ref No.':c.refNo||'','Phone':c.phone||'','Amount Collected':x.amount,'Payment Mode':x.mode,'Payment Date':x.date,'Note':x.note||'','Total Due':c.amount,'Status':c.paid?'Paid':'Unpaid'});
    });
  });
  if(!rows.length){showToast('No collections for this month','info');return;}
  const [yr,mn]=monthKey.split('-');
  const monthName=new Date(yr,mn-1,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  // Summary row
  const total=rows.reduce((s,r)=>s+r['Amount Collected'],0);
  rows.push({});
  rows.push({'Customer Name':'TOTAL','Amount Collected':total});
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[22,14,13,16,14,14,20,12,10].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,monthName.slice(0,31));
  XLSX.writeFile(wb,`Collection_${monthName.replace(' ','_')}.xlsx`);
  showToast(`✅ ${monthName} report downloaded! (${rows.length-2} entries)`);
}

    const {collected,balance}=collectBalance(c);

  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[22,16,13,22,14,12,12,12,14,14,20,20,12,10].map(w=>({wch:w}));

  XLSX.utils.book_append_sheet(wb,ws,'Due Records');

function handleBackupJSON() {
  if(!state.customers.length){showToast('No data to backup','info');return;}
  const blob=new Blob([JSON.stringify(state.customers,null,2)],{type:'application/json'});

function handleRestoreJSON(file) {
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){showToast('Invalid backup file','error');return;}
      state.restorePreview={records:data,source:'JSON',fileName:file.name,collectionCount:data.reduce((s,r)=>s+(r.collections||[]).length,0)};
      render();
    }catch{showToast('Could not read JSON file','error');}
  };
  reader.readAsText(file);
}

function handleRestoreExcel(file) {
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false});
      const sheetName=wb.SheetNames.includes('Due Records')?'Due Records':wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{defval:''});
      if(!rows.length){showToast('No data found in Excel','error');return;}
      let collectionRows=[];
      if(wb.SheetNames.includes('Collection History')) collectionRows=XLSX.utils.sheet_to_json(wb.Sheets['Collection History'],{defval:''});
      const records=rows.map(row=>{
        const name=String(row['Name']||row["Party's Name"]||row['Customer Name']||'').trim();
        const refNo=String(row['Ref No.']||row['Ref. No.']||row['Reference No.']||'').trim();
        const phone=String(row['Phone']||row['Mobile']||'').replace(/\D/g,'').slice(-10);
        const email=String(row['Email']||'').trim();
        const notes=String(row['Notes']||row['Remarks']||'').trim();
        const rawAmt=row['Total Amount']||row['Pending Amount']||row['Amount']||0;
        const amount=parseFloat(String(rawAmt).replace(/[₹,\s]/g,''))||0;
        const rawColl=row['Collected']||0;
        const collectedAmt=parseFloat(String(rawColl).replace(/[₹,\s]/g,''))||0;
        const dueDate=parseExcelDate(row['Due Date']||row['Due On']||'');
        const reminderDate=parseExcelDate(row['Reminder Date']||'');
        const reminderNote=String(row['Reminder Note']||'').trim();
        const paid=String(row['Status']||'').toLowerCase()==='paid';
        const createdAt=row['Created']?new Date(row['Created']).toISOString():new Date().toISOString();
        if(!name||!amount||!dueDate) return null;
        let collections=[];
        if(collectedAmt>0&&collectionRows.length===0) collections=[{id:genId(),amount:collectedAmt,date:dueDate,mode:'Restored',note:'Imported from Excel backup',at:createdAt}];
        return {id:genId(),name,refNo,phone,email,notes,amount,dueDate,reminderDate,reminderNote,paid,collections,reminders:[],createdAt};
      }).filter(Boolean);
      if(collectionRows.length>0){
        const collMap={};
        collectionRows.forEach(row=>{
          const custName=String(row['Customer']||'').trim();
          const custRef=String(row['Ref No.']||'').trim();
          const key=`${custName}|${custRef}`;
          const amt=parseFloat(String(row['Amount Collected']||0).replace(/[₹,\s]/g,''))||0;
          const date=parseExcelDate(row['Date']||'')||new Date().toISOString().split('T')[0];
          const mode=String(row['Mode']||'Cash').trim();
          const note=String(row['Note']||'').trim();
          if(!collMap[key]) collMap[key]=[];
          collMap[key].push({id:genId(),amount:amt,date,mode,note,at:new Date().toISOString()});
        });
        records.forEach(c=>{const key=`${c.name}|${c.refNo}`;if(collMap[key]) c.collections=collMap[key];});
      }
      if(!records.length){showToast('No valid records found','error');return;}
      const totalColl=records.reduce((s,r)=>s+r.collections.length,0);
      state.restorePreview={records,source:'Excel',fileName:file.name,collectionCount:totalColl};
      render();
    }catch(err){showToast('Excel read error: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}

function confirmRestore(mode) {
  if(!state.restorePreview) return;
  if(mode==='replace'){
    state.customers=state.restorePreview.records;
    showToast(`✅ Replaced with ${state.restorePreview.records.length} records!`);
  } else {
    state.customers=[...state.customers,...state.restorePreview.records];
    showToast(`✅ Added ${state.restorePreview.records.length} records!`);
  }
  state.restorePreview=null; saveData(); render();
}

// fbClearing declared above with other Firebase variables

function handleClear() {
  state.customers = [];
  try { localStorage.removeItem(STORAGE_KEY); } catch{}
  state.showClearConfirm = false;
  state.clearPhase = 1;
  state.clearInput = '';

  if (!fbRef || !fbDb) {
    showToast('All data cleared! 🗑️', 'info');
    render();
    return;
  }

  // Block our own listener from reacting to the clear signal
  fbClearing = true;
  if (fbListener) { fbRef.off('value', fbListener); fbListener = null; }

  // 1. Broadcast CLEAR signal to all other devices
  // 2. Delete all data from Firebase
  // 3. Remove the CLEAR signal after 3s
  // 4. Restart listener after 2s
  fbDb.ref('duemaster_cleared').set(true)
    .then(() => fbRef.set(null))
    .then(() => {
      updateSyncStatus('🗑️ Cleared on all devices', '#f59e0b');
      render();
      setTimeout(() => {
        fbDb.ref('duemaster_cleared').set(null).catch(()=>{});
      }, 3000);
      setTimeout(() => {
        fbClearing = false;
        startListener();
        updateSyncStatus('✅ Synced', '#16a34a');
      }, 2000);
    })
    .catch(() => {
      fbClearing = false;
      startListener();
      updateSyncStatus('❌ Clear failed on Firebase', '#ef4444');
    });

  showToast('All data cleared on all devices! 🗑️', 'info');
  render();
}

// ── BULK IMPORT LOGIC ────────────────────────────────────────────────────────
const BULK_FIELDS=[{key:'name',label:'Customer Name *'},{key:'refNo',label:'Ref No.'},{key:'phone',label:'Phone'},{key:'email',label:'Email'},{key:'amount',label:'Amount *'},{key:'dueDate',label:'Due Date *'},{key:'notes',label:'Notes'}];
const BULK_REQUIRED=['name','amount','dueDate'];

function autoMap(headers) {
  const map={};
  const pats={name:/name|party|customer|client/i,refNo:/ref|inv|bill/i,phone:/phone|mobile|mob/i,email:/email|mail/i,amount:/amount|pending|balance|total/i,dueDate:/due.*date|date.*due|due on/i,notes:/note|remark/i};
  headers.forEach((h,idx)=>{for(const[f,re] of Object.entries(pats)) if(re.test(String(h))&&map[f]===undefined){map[f]=idx;}});
  return map;
}

function bulkReadFile(file) {
  if(!file) return;
  if(!['xlsx','xls'].includes(file.name.split('.').pop().toLowerCase())){showToast('Upload .xlsx or .xls','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(raw.length<2){showToast('No data in file','error');return;}
      let hi=0;for(let i=0;i<Math.min(5,raw.length);i++){if(raw[i].some(c=>c!=='')){hi=i;break;}}
      const headers=raw[hi].map(h=>String(h).trim());
      const dataRows=raw.slice(hi+1).filter(r=>r.some(c=>c!==''));
      state.bulkImport={stage:'map',preview:{headers,dataRows,fileName:file.name},mapping:autoMap(headers),result:null,drag:false};
      render();
    }catch(err){showToast('Read error: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}

function bulkDoImport() {
  const {mapping,preview}=state.bulkImport;
  const miss=BULK_REQUIRED.filter(f=>mapping[f]===undefined);
  if(miss.length){showToast('Map required: '+miss.join(', '),'error');return;}
  const good=[],bad=[];
  preview.dataRows.forEach((row,idx)=>{
    const name=String(row[mapping.name]||'').trim();
    const amount=parseFloat(String(row[mapping.amount]||'').replace(/[₹,\s]/g,''));
    const dueDate=parseExcelDate(row[mapping.dueDate]);
    if(!name||isNaN(amount)||!dueDate){bad.push({row:idx+2,name:name||'(blank)',reason:!name?'Missing name':isNaN(amount)?'Bad amount':'Bad date'});return;}
    good.push({id:genId(),name,refNo:mapping.refNo!==undefined?String(row[mapping.refNo]||'').trim():'',phone:mapping.phone!==undefined?String(row[mapping.phone]||'').replace(/\D/g,'').slice(-10):'',email:mapping.email!==undefined?String(row[mapping.email]||'').trim():'',notes:mapping.notes!==undefined?String(row[mapping.notes]||'').trim():'',amount,dueDate,paid:false,collections:[],reminders:[],reminderDate:'',reminderNote:'',createdAt:new Date().toISOString()});
  });
  state.bulkImport.stage='result';
  state.bulkImport.result={good:good.length,bad};
  if(good.length){handleBulkImport(good);}
  render();
}

        <div style="font-size:13px;font-weight:700;color:#991b1b;margin-bottom:4px;display:flex;align-items:center;gap:6px">${IC.trash} Clear All Data</div>

        <button onclick="state.showClearConfirm=true;state.clearPhase=1;state.clearInput='';render()" ${!state.customers.length?'disabled':''} style="padding:10px 18px;background:${!state.customers.length?'#f1f5f9':'#fff1f2'};color:${!state.customers.length?'#94a3b8':'#ef4444'};border:1.5px solid ${!state.customers.length?'#e2e8f0':'#fca5a5'};border-radius:8px;font-size:12px;font-weight:700;cursor:${!state.customers.length?'not-allowed':'pointer'};display:inline-flex;align-items:center;gap:6px">${IC.trash} ${!state.customers.length?'No Data to Clear':'Clear All Data'}</button>
      </div>
    </div>`;
  }

  html+=`</div>`; // close main content

  // ── MODALS ──
  // Collection Modal
  if(state.collectCust){
    const c=state.collectCust;
    const {collected,balance}=collectBalance(c);
    html+=`<div class="modal-overlay" onclick="if(event.target===this){state.collectCust=null;render()}">
      <div class="modal-box" style="max-width:500px">
        <div class="modal-header"><h3 style="margin:0;font-size:15px;font-weight:700;color:#0f172a;font-family:'Playfair Display',serif">Collect Payment — ${c.name}</h3><button onclick="state.collectCust=null;render()" style="background:none;border:none;cursor:pointer;color:#64748b">${IC.X}</button></div>
        <div class="modal-body">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px">
            ${[{l:'Total Due',v:fc(c.amount),col:'#2563eb'},{l:'Collected',v:fc(collected),col:'#16a34a'},{l:'Balance Due',v:fc(balance),col:balance>0?'#ef4444':'#16a34a'}].map(x=>`
              <div style="background:#f8fafc;border-radius:9px;padding:10px 12px;text-align:center;border:1.5px solid ${x.col}22">
                <div style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:3px">${x.l}</div>
                <div style="font-size:16px;font-weight:800;color:${x.col}">${x.v}</div>
              </div>`).join('')}
          </div>
          ${balance<=0?`<div style="text-align:center;padding:20px;color:#16a34a;font-weight:700;font-size:14px">✅ Fully Collected!</div>`:`
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">
            <div class="field-wrap"><label class="field-label">Collection Amount (₹) *</label><input class="inp" type="number" id="colAmt" placeholder="Max ${fc(balance)}"/></div>
            <div class="field-wrap"><label class="field-label">Date *</label><input class="inp" type="date" id="colDate" value="${new Date().toISOString().split('T')[0]}"/></div>
            <div class="field-wrap"><label class="field-label">Payment Mode</label><select class="inp" id="colMode"><option>Cash</option><option>UPI</option><option>NEFT/RTGS</option><option>Cheque</option><option>Bank Transfer</option><option>Other</option></select></div>
            <div class="field-wrap"><label class="field-label">Note</label><input class="inp" id="colNote" placeholder="Optional note…"/></div>
          </div>
          <div id="colErr" style="color:#ef4444;font-size:12px;margin-bottom:10px"></div>
          <div style="display:flex;gap:8px">
            <button onclick="submitCollection('${c.id}',${balance})" style="flex:1;padding:11px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">💰 Record Collection</button>
            <button onclick="state.collectCust=null;render()" class="btn-cancel">Cancel</button>
          </div>`}
          ${(c.collections||[]).length>0?`
          <div style="margin-top:20px">
            <div style="font-size:11px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;gap:5px">${IC.hist} Collection History</div>
            ${[...c.collections].reverse().map(x=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:#f8fafc;border-radius:7px;margin-bottom:5px;font-size:12px">
                <div><span style="font-weight:700;color:#16a34a">${fc(x.amount)}</span><span style="color:#64748b;margin-left:8px">${x.mode}</span>${x.note?`<span style="color:#94a3b8;margin-left:6px">· ${x.note}</span>`:''}</div>
                <div style="color:#64748b;font-size:11px">${fd(x.date)}</div>
              </div>`).join('')}
          </div>`:''}
        </div>
      </div></div>`;
  }

  // Reminder Date Modal
  if(state.remDateCust){
    const c=state.remDateCust;
    const presets=[{l:'Tomorrow',d:new Date(Date.now()+86400000).toISOString().split('T')[0]},{l:'In 3 Days',d:new Date(Date.now()+3*86400000).toISOString().split('T')[0]},{l:'In 1 Week',d:new Date(Date.now()+7*86400000).toISOString().split('T')[0]},{l:'In 2 Weeks',d:new Date(Date.now()+14*86400000).toISOString().split('T')[0]}];
    html+=`<div class="modal-overlay" onclick="if(event.target===this){state.remDateCust=null;render()}">
      <div class="modal-box">
        <div class="modal-header"><h3 style="margin:0;font-size:15px;font-weight:700;color:#0f172a;font-family:'Playfair Display',serif">Set Reminder — ${c.name}</h3><button onclick="state.remDateCust=null;render()" style="background:none;border:none;cursor:pointer;color:#64748b">${IC.X}</button></div>
        <div class="modal-body">
          <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:9px;padding:10px 13px;margin-bottom:16px;font-size:12px;color:#0369a1">
            <strong>Balance Due:</strong> ${fc(collectBalance(c).balance)} &nbsp;|&nbsp; <strong>Due Date:</strong> ${fd(c.dueDate)}
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
            ${presets.map(p=>`<button onclick="document.getElementById('remDateInput').value='${p.d}'" style="padding:6px 11px;background:#f1f5f9;color:#475569;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer">${p.l}</button>`).join('')}
          </div>
          <div class="field-wrap"><label class="field-label">Reminder Date *</label><input class="inp" type="date" id="remDateInput" value="${c.reminderDate||''}"/></div>
          <div class="field-wrap"><label class="field-label">Reminder Note</label><input class="inp" id="remNoteInput" value="${(c.reminderNote||'').replace(/"/g,'&quot;')}" placeholder="e.g. Call after 5 PM…"/></div>
          <div style="display:flex;gap:8px">
            <button onclick="submitRemDate('${c.id}')" style="flex:1;padding:11px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">📅 Set Reminder</button>
            ${c.reminderDate?`<button onclick="handleReminderDate('${c.id}','','');render()" style="padding:11px 13px;background:#fff1f2;color:#e11d48;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Clear</button>`:''}
            <button onclick="state.remDateCust=null;render()" class="btn-cancel">Cancel</button>
          </div>
        </div>
      </div></div>`;
  }

  // Send Reminder Modal
  if(state.sendRemCust){
    const c=state.sendRemCust;
    const bal=collectBalance(c).balance;
    const days=daysFrom(c.dueDate);
    const defaultMsg=`Dear ${c.name},\n\nThis is a friendly reminder that your payment of ${fc(bal)} (Ref: ${c.refNo||'N/A'}) was due on ${fd(c.dueDate)}.\n\nKindly arrange the payment at the earliest.\n\nThank you.`;
    html+=`<div class="modal-overlay" onclick="if(event.target===this){state.sendRemCust=null;render()}">
      <div class="modal-box">
        <div class="modal-header"><h3 style="margin:0;font-size:15px;font-weight:700;color:#0f172a;font-family:'Playfair Display',serif">Send Reminder — ${c.name}</h3><button onclick="state.sendRemCust=null;render()" style="background:none;border:none;cursor:pointer;color:#64748b">${IC.X}</button></div>
        <div class="modal-body">
          <div style="background:#f8fafc;border-radius:8px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:#475569">
            <strong>Balance:</strong> ${fc(bal)} &nbsp;|&nbsp; <strong>Due:</strong> ${fd(c.dueDate)} &nbsp;|&nbsp;
            <strong style="color:${days>0?'#ef4444':'#22c55e'}">${days>0?days+' days overdue':'Upcoming'}</strong>
          </div>
          <div class="field-wrap"><label class="field-label">Message</label><textarea class="inp" id="remMsg" style="min-height:110px;resize:vertical">${defaultMsg}</textarea></div>
          <div style="display:flex;gap:7px;flex-wrap:wrap">
            ${c.phone?`<a href="https://wa.me/91${c.phone}?text=${encodeURIComponent(defaultMsg)}" target="_blank" onclick="handleSendReminder('${c.id}','whatsapp')" style="flex:1;padding:9px 12px;background:#25D366;color:#fff;border-radius:7px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:5px;text-decoration:none">${IC.wa} WhatsApp</a>`:''}
            ${c.phone?`<a href="sms:${c.phone}" onclick="handleSendReminder('${c.id}','sms')" style="flex:1;padding:9px 12px;background:#3b82f6;color:#fff;border-radius:7px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:5px;text-decoration:none">${IC.sms} SMS</a>`:''}
            <button onclick="navigator.clipboard.writeText(document.getElementById('remMsg').value);handleSendReminder('${c.id}','copy');" style="flex:1;padding:9px 12px;background:#7c3aed;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer">📋 Copy</button>
          </div>
        </div>
      </div></div>`;
  }

  // Firebase Setup Modal
  if(state.showFbSetup){
    const ff=state.fbForm;
    html+=`<div class="modal-overlay" onclick="if(event.target===this){state.showFbSetup=false;render()}">
      <div class="modal-box" style="max-width:520px">
        <div class="modal-header"><h3 style="margin:0;font-size:15px;font-weight:700;color:#0f172a;font-family:'Playfair Display',serif">🔥 Connect Firebase</h3><button onclick="state.showFbSetup=false;render()" style="background:none;border:none;cursor:pointer;color:#64748b">${IC.X}</button></div>
        <div class="modal-body">
          <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:9px;padding:12px 14px;margin-bottom:16px;font-size:11px;color:#92400e">
            <strong>📋 How to get your Firebase config (5 minutes):</strong><br/>
            1. Go to <a href="https://console.firebase.google.com" target="_blank" style="color:#ea580c">console.firebase.google.com</a><br/>
            2. Click <strong>Add project</strong> → name it <strong>duemaster</strong> → Create<br/>
            3. Click <strong>Web icon (&lt;/&gt;)</strong> → Register app → name it <strong>duemaster</strong><br/>
            4. Copy the config values shown and paste below<br/>
            5. Go to <strong>Build → Realtime Database → Create database → Start in test mode</strong>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">
            <div style="grid-column:1/-1"><div class="field-wrap"><label class="field-label">API Key *</label><input class="inp" value="${ff.apiKey.replace(/"/g,'&quot;')}" oninput="state.fbForm.apiKey=this.value" placeholder="AIzaSy..."/></div></div>
            <div class="field-wrap"><label class="field-label">Auth Domain *</label><input class="inp" value="${ff.authDomain.replace(/"/g,'&quot;')}" oninput="state.fbForm.authDomain=this.value" placeholder="yourapp.firebaseapp.com"/></div>
            <div class="field-wrap"><label class="field-label">Project ID *</label><input class="inp" value="${ff.projectId.replace(/"/g,'&quot;')}" oninput="state.fbForm.projectId=this.value" placeholder="your-project-id"/></div>
            <div style="grid-column:1/-1"><div class="field-wrap"><label class="field-label">Database URL *</label><input class="inp" value="${ff.databaseURL.replace(/"/g,'&quot;')}" oninput="state.fbForm.databaseURL=this.value" placeholder="https://your-project-default-rtdb.firebaseio.com"/></div></div>
          </div>
          <div id="fbErr" style="color:#ef4444;font-size:12px;margin-bottom:10px;display:none"></div>
          <div style="display:flex;gap:8px">
            <button onclick="connectFirebase()" style="flex:1;padding:11px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🔥 Connect & Sync</button>
            <button onclick="state.showFbSetup=false;render()" class="btn-cancel">Cancel</button>
          </div>
          <p style="margin:12px 0 0;font-size:10px;color:#94a3b8;text-align:center">Your Firebase config is saved only on this device. Data syncs instantly across all connected devices.</p>
        </div>
      </div></div>`;
  }
  if(state.confirmDel){
    html+=`<div class="modal-overlay" onclick="if(event.target===this){state.confirmDel=null;render()}">
      <div class="modal-box" style="max-width:320px;text-align:center">
        <div class="modal-body">
          <div style="font-size:32px;margin-bottom:8px">🗑️</div>
          <h3 style="margin:0 0 5px;font-size:14px;font-weight:700;color:#0f172a">Delete Record?</h3>
          <p style="margin:0 0 18px;color:#64748b;font-size:12px">This cannot be undone.</p>
          <div style="display:flex;gap:8px;justify-content:center">
            <button onclick="handleDelete('${state.confirmDel}')" style="padding:8px 18px;background:#ef4444;color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer">Delete</button>
            <button onclick="state.confirmDel=null;render()" style="padding:8px 18px;background:#f1f5f9;color:#475569;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer">Cancel</button>
          </div>
        </div>
      </div></div>`;
  }

  // Clear Confirm Modal
  if(state.showClearConfirm){
    html+=`<div class="modal-overlay">
      <div class="modal-box" style="max-width:380px">
        <div class="modal-body">`;
    if(state.clearPhase===1){
      html+=`<div style="font-size:36px;text-align:center;margin-bottom:10px">⚠️</div>
        <h3 style="margin:0 0 8px;font-size:15px;font-weight:800;color:#991b1b;text-align:center">Clear All Data?</h3>
        <p style="margin:0 0 6px;color:#64748b;font-size:12px;text-align:center">You are about to permanently delete:</p>
        <div style="background:#fff1f2;border-radius:9px;padding:12px 16px;margin-bottom:16px">
          ${[['👤',state.customers.length+' customer records'],['💰',state.customers.reduce((s,c)=>s+(c.collections||[]).length,0)+' collection entries'],['🔔',state.customers.reduce((s,c)=>s+(c.reminders||[]).length,0)+' reminder logs'],['📋',fc(totalPending)+' pending dues']].map(([i,l])=>`<div style="font-size:12px;color:#7f1d1d;padding:3px 0">${i} ${l}</div>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="state.clearPhase=2;render()" style="flex:1;padding:10px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">Yes, Continue →</button>
          <button onclick="state.showClearConfirm=false;render()" style="flex:1;padding:10px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Cancel</button>
        </div>`;
    } else {
      html+=`<div style="font-size:36px;text-align:center;margin-bottom:10px">🔐</div>
        <h3 style="margin:0 0 8px;font-size:15px;font-weight:800;color:#991b1b;text-align:center">Final Confirmation</h3>
        <p style="margin:0 0 12px;color:#64748b;font-size:12px;text-align:center">Type <strong>CLEAR</strong> below to confirm:</p>
        <input class="inp" id="clearInput" value="${state.clearInput}" oninput="state.clearInput=this.value.toUpperCase();this.value=state.clearInput;updateClearBtn()" placeholder="Type CLEAR here" maxlength="5" style="text-align:center;font-size:16px;font-weight:700;letter-spacing:.15em;margin-bottom:12px;border-color:${state.clearInput==='CLEAR'?'#ef4444':'#e2e8f0'}"/>
        <div style="display:flex;gap:8px">
          <button id="clearBtn" onclick="if(state.clearInput==='CLEAR')handleClear()" ${state.clearInput!=='CLEAR'?'disabled':''} style="flex:1;padding:10px;background:${state.clearInput==='CLEAR'?'#ef4444':'#fca5a5'};color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:${state.clearInput==='CLEAR'?'pointer':'not-allowed'}">🗑️ Delete Everything</button>
          <button onclick="state.showClearConfirm=false;render()" style="flex:1;padding:10px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Cancel</button>
        </div>`;
    }
    html+=`</div></div></div>`;
  }

  // Restore Preview Modal
  if(state.restorePreview){
    const rp=state.restorePreview;
    html+=`<div class="modal-overlay" onclick="if(event.target===this){state.restorePreview=null;render()}">
      <div class="modal-box" style="max-width:400px">
        <div class="modal-body">
          <div style="font-size:36px;text-align:center;margin-bottom:8px">📂</div>
          <h3 style="margin:0 0 4px;font-size:16px;font-weight:800;color:#0f172a;text-align:center">Backup File Ready</h3>
          <p style="margin:0 0 16px;color:#64748b;font-size:11px;text-align:center;word-break:break-all">${rp.fileName}</p>
          <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:12px 16px;margin-bottom:18px">
            ${[['Source',rp.source==='JSON'?'JSON (Full backup)':'Excel (.xlsx)'],['Records Found',rp.records.length],['Paid',rp.records.filter(r=>r.paid).length],['Unpaid',rp.records.filter(r=>!r.paid).length],['Collection Entries',rp.collectionCount??rp.records.reduce((s,r)=>s+(r.collections||[]).length,0)]].map(([l,v])=>`
              <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #e0f2fe"><span style="color:#475569">${l}</span><strong style="color:#0f172a">${v}</strong></div>`).join('')}
          </div>
          <p style="margin:0 0 10px;font-size:11px;color:#64748b;text-align:center">How do you want to import these records?</p>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <button onclick="confirmRestore('replace')" style="flex:1;padding:11px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">🔄 Replace All</button>
            <button onclick="confirmRestore('merge')" style="flex:1;padding:11px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">➕ Merge / Add</button>
          </div>
          <button onclick="state.restorePreview=null;render()" style="width:100%;padding:9px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Cancel</button>
          <p style="margin:10px 0 0;font-size:10px;color:#94a3b8;text-align:center"><strong>Replace</strong> = wipe current + load backup &nbsp;·&nbsp; <strong>Merge</strong> = add to existing</p>
        </div>
      </div></div>`;
  }

  document.getElementById('app').innerHTML = html;
}

// ── GLOBAL ACTION HELPERS ────────────────────────────────────────────────────
function openCollect(id) { state.collectCust=state.customers.find(c=>c.id===id)||null; render(); }
function openRemDate(id) { state.remDateCust=state.customers.find(c=>c.id===id)||null; render(); }
function openSendRem(id) { state.sendRemCust=state.customers.find(c=>c.id===id)||null; render(); }
function doEdit(id) { const c=state.customers.find(x=>x.id===id); if(c) handleEdit(c); }

function submitCollection(custId, maxBalance) {
  const amt=parseFloat(document.getElementById('colAmt')?.value);
  const date=document.getElementById('colDate')?.value;
  const mode=document.getElementById('colMode')?.value||'Cash';
  const note=document.getElementById('colNote')?.value||'';
  const errEl=document.getElementById('colErr');
  if(!amt||amt<=0){if(errEl)errEl.textContent='Enter a valid amount';return;}
  if(amt>maxBalance){if(errEl)errEl.textContent='Amount exceeds balance ('+fc(maxBalance)+')';return;}
  handleCollection(custId,{id:genId(),amount:amt,date,mode,note,at:new Date().toISOString()});
}

function submitRemDate(custId) {
  const date=document.getElementById('remDateInput')?.value||'';
  const note=document.getElementById('remNoteInput')?.value||'';
  handleReminderDate(custId,date,note);
}

function handleRestoreFile(file) {
  if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='json') handleRestoreJSON(file);
  else if(['xlsx','xls'].includes(ext)) handleRestoreExcel(file);
  else showToast('Please upload .xlsx, .xls or .json file','error');
}

function connectFirebase() {
  const ff = state.fbForm;
  const errEl = document.getElementById('fbErr');
  if(!ff.apiKey||!ff.authDomain||!ff.databaseURL||!ff.projectId){
    if(errEl){errEl.textContent='Please fill all fields';errEl.style.display='block';}
    return;
  }
  const cfg = {
    apiKey: ff.apiKey.trim(),
    authDomain: ff.authDomain.trim(),
    databaseURL: ff.databaseURL.trim(),
    projectId: ff.projectId.trim()
  };
  if(errEl){errEl.textContent='Connecting…';errEl.style.display='block';errEl.style.color='#f97316';}
  const ok = initFirebase(cfg);
  if(ok){
    state.showFbSetup=false;
    showToast('🔥 Firebase connected! Syncing…');
    render();
  } else {
    if(errEl){errEl.textContent='Connection failed. Check your config values.';errEl.style.color='#ef4444';errEl.style.display='block';}
  }
}

function updateClearBtn() {
  const ok = state.clearInput === 'CLEAR';
  const btn = document.getElementById('clearBtn');
  const inp = document.getElementById('clearInput');
  if (btn) {
    btn.disabled = !ok;
    btn.style.background = ok ? '#ef4444' : '#fca5a5';
    btn.style.cursor = ok ? 'pointer' : 'not-allowed';
  }
  if (inp) {
    inp.style.borderColor = ok ? '#ef4444' : '#e2e8f0';
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadData();
render();
</script>
</body>
</html>
